name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────
  # CD — Build & Push Docker Images
  # ──────────────────────────────────────────────
  cd-docker:
    name: CD — Build & Push Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend:${{ github.sha }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend:${{ github.sha }}

  # ──────────────────────────────────────────────
  # Deploy — Run on Remote Server (EC2)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: cd-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SSH_USERNAME }}/app/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/app

            cat > .env << EOF
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            NODE_ENV=production
            PORT=5000
            NEXT_PUBLIC_API_URL=http://${{ secrets.SSH_HOST }}:5000
            EOF

            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/todo-backend:latest
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/todo-frontend:latest

            docker compose down || true
            docker compose up -d