name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

jobs:
  # ──────────────────────────────────────────────
  # CD — Build & Push Docker Images
  # ──────────────────────────────────────────────
  cd-docker:
    name: CD — Build & Push Docker Images
    runs-on: ubuntu-latest
    # Ensure this only runs if the CI workflow was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/todo-backend:latest
            ${{ env.DOCKER_HUB_USERNAME }}/todo-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/todo-frontend:latest
            ${{ env.DOCKER_HUB_USERNAME }}/todo-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Deploy — Run on Remote Server (VPS)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: cd-docker
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Use password instead of key if that's how you login:
          # password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # 1. Navigate to the project directory (Update this path if it's different on your server)
            cd ~/todo
            
            # 2. Pull the latest code (to get any updates to docker-compose.yml or nginx.conf)
            git pull origin main
            
            # 3. Pull the latest built Docker images
            docker pull ${{ env.DOCKER_HUB_USERNAME }}/todo-backend:latest
            docker pull ${{ env.DOCKER_HUB_USERNAME }}/todo-frontend:latest
            
            # 4. Stop old containers, rebuild the architecture, and start in detached mode
            docker compose down
            docker compose up -d
